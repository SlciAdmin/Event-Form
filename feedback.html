<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Session Feedback - EventPro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="form-container">
        <!-- Header with Back Button -->
        <div class="form-nav">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <h2><i class="fas fa-comment-dots"></i> Session Feedback</h2>
        </div>
        
        <form id="feedbackForm" class="main-form" novalidate>
            <div class="section-title"><i class="fas fa-user-circle"></i> Your Details</div>
            
            <div class="form-row">
                <div class="field">
                    <label for="fb_name"><i class="fas fa-user"></i> Name <span class="req">*</span></label>
                    <input type="text" id="fb_name" name="name" placeholder="Your Full Name" required>
                </div>
                
                <div class="field">
                    <label for="fb_designation"><i class="fas fa-briefcase"></i> Designation <span class="req">*</span></label>
                    <input type="text" id="fb_designation" name="designation" placeholder="e.g., Manager" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="field">
                    <label for="fb_company"><i class="fas fa-building"></i> Company <span class="req">*</span></label>
                    <input type="text" id="fb_company" name="company" placeholder="Your Company" required>
                </div>
                
                <div class="field">
                    <label for="fb_employees"><i class="fas fa-users"></i> Employees <span class="req">*</span></label>
                    <input type="number" id="fb_employees" name="employees" placeholder="e.g., 50" min="1" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="field">
                    <label for="fb_phone"><i class="fas fa-phone"></i> Contact <span class="req">*</span></label>
                    <input type="tel" id="fb_phone" name="phone" placeholder="9876543210" pattern="[6-9][0-9]{9}" required>
                </div>
                
                <div class="field">
                    <label for="fb_email"><i class="fas fa-envelope"></i> Email <span class="req">*</span></label>
                    <input type="email" id="fb_email" name="email" placeholder="you@email.com" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="field full">
                    <label for="fb_city"><i class="fas fa-city"></i> City <span class="req">*</span></label>
                    <input type="text" id="fb_city" name="city" placeholder="Your City" required>
                </div>
            </div>
            
            <div class="section-title"><i class="fas fa-star"></i> Session Rating</div>
            
            <div class="form-row">
                <div class="field full">
                    <label>Overall Experience <span class="req">*</span></label>
                    <div class="star-rating" id="fbStarRating">
                        <input type="radio" id="fbStar5" name="fb_rating" value="5"><label for="fbStar5">★</label>
                        <input type="radio" id="fbStar4" name="fb_rating" value="4"><label for="fbStar4">★</label>
                        <input type="radio" id="fbStar3" name="fb_rating" value="3"><label for="fbStar3">★</label>
                        <input type="radio" id="fbStar2" name="fb_rating" value="2"><label for="fbStar2">★</label>
                        <input type="radio" id="fbStar1" name="fb_rating" value="1" required><label for="fbStar1">★</label>
                    </div>
                </div>
            </div>
            
            <div class="form-row">
                <div class="field full">
                    <label for="fb_remarks"><i class="fas fa-comment"></i> Additional Remarks</label>
                    <textarea id="fb_remarks" rows="3" placeholder="Your suggestions or feedback..."></textarea>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" id="fbSubmitBtn" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Submit Feedback
                </button>
            </div>
        </form>
        
        <!-- Success Message (Hidden Initially) -->
        <div id="fbSuccessMsg" class="success-message hidden">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h3>Thank You!</h3>
            <p>Your feedback has been submitted successfully.</p>
            <div class="success-actions">
                <a href="index.html" class="btn-home"><i class="fas fa-home"></i> Back to Home</a>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast hidden"></div>
    <div id="loader" class="loader hidden"><div class="spin"></div><p>Submitting...</p></div>
    
    <script src="feedback.js"></script>
</body>
</html>
